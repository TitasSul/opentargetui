<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenTarget UI</title>
    <style>
      :root {
        --otu-bg: #10100e;
        --otu-panel: #151512;
        --otu-soft: #1c1b18;
        --otu-button: #181815;
        --otu-button-hover: #22221e;
        --otu-ink: #f4f2ea;
        --otu-muted: #aaa598;
        --otu-line: rgba(244, 242, 234, 0.14);
        --otu-accent: #35c5b1;
        --otu-accent-ink: #061916;
        color-scheme: dark;
        font-family: "Geist", "Satoshi", "Aptos", ui-sans-serif, sans-serif;
        background: var(--otu-bg);
        color: var(--otu-ink);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        font-family: "Geist", "Satoshi", "Aptos", ui-sans-serif, sans-serif;
      }

      body {
        width: 304px;
        margin: 0;
        background: var(--otu-bg);
      }

      main {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .mark {
        width: 32px;
        height: 32px;
        border: 1px solid color-mix(in srgb, var(--otu-accent) 40%, var(--otu-line));
        border-radius: 8px;
        background: color-mix(in srgb, var(--otu-accent) 12%, var(--otu-bg));
        color: var(--otu-accent);
        display: grid;
        place-items: center;
      }

      .icon {
        width: 16px;
        height: 16px;
        stroke-width: 2.2;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 2px 0 0;
        color: var(--otu-muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--otu-line);
        border-radius: 8px;
        background: var(--otu-soft);
        font-size: 12px;
        color: var(--otu-ink);
      }

      .reference {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--otu-line);
        border-radius: 8px;
        background: var(--otu-soft);
      }

      .reference-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
      }

      .reference-title {
        font-size: 12px;
        font-weight: 700;
      }

      .reference-status {
        color: var(--otu-muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--otu-accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--otu-accent) 18%, transparent);
      }

      button {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--otu-line);
        border-radius: 8px;
        background: var(--otu-button);
        color: var(--otu-ink);
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .icon-button {
        width: 36px;
        min-height: 34px;
        padding: 0;
      }

      button:hover {
        border-color: color-mix(in srgb, var(--otu-accent) 54%, var(--otu-line));
        background: color-mix(in srgb, var(--otu-accent) 12%, var(--otu-button-hover));
        color: var(--otu-accent);
      }

      button.primary {
        border-color: color-mix(in srgb, var(--otu-accent) 74%, var(--otu-line));
        background: var(--otu-accent);
        color: var(--otu-accent-ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.46;
      }

      button:disabled:hover {
        border-color: var(--otu-line);
        background: var(--otu-button);
        color: var(--otu-ink);
      }
    </style>
    <script type="module" crossorigin src="/popup.js"></script>
  </head>
  <body>
    <main>
      <div class="header">
        <div class="mark" id="brand-icon"></div>
        <div>
          <h1>OpenTarget UI</h1>
          <p>Annotate this page for your coding agent.</p>
        </div>
      </div>
      <div class="status"><span class="dot"></span><span id="status">UI hidden by default</span></div>
      <button id="ui-toggle" class="primary"><span class="button-icon" data-icon="target"></span><span>Show UI</span></button>
      <button id="toggle"><span class="button-icon" data-icon="target"></span><span>Start annotating</span></button>
      <div class="reference">
        <div class="reference-row">
          <div>
            <div class="reference-title">Structure reference</div>
            <div class="reference-status" id="reference-status">No structure reference saved</div>
          </div>
          <button id="clear-structure" class="icon-button" aria-label="Clear structure reference" title="Clear reference">&times;</button>
        </div>
        <button id="capture-structure"><span class="button-icon" data-icon="target"></span><span>Capture this structure</span></button>
      </div>
      <button id="copy"><span class="button-icon" data-icon="copy"></span><span>Copy request</span></button>
    </main>
  </body>
</html>
